name: Sync Upstream (Serac)

# Weekly triage of new commits on https://github.com/serac-labs/serac (main branch).
#
# Two phases each run:
#   1. report  — fetch upstream, post/update the open upstream-sync issue with unresolved commits
#   2. triage  — Claude Code reads the state file, cherry-picks appropriate commits, and opens a PR
#
# Source of truth is `.github/upstream-sync-state.json`:
#   cursor                  — oldest upstream SHA we still track. Only `script/upstream-triage.ts
#                             advance` or Claude moves it forward.
#   last_synced_upstream    — latest upstream HEAD this workflow saw. Informational.
#   last_synced_at          — date of last workflow run. Informational.
#   decisions               — map of upstream SHA → { status, reason, our_commit?, date }.
#                             status is "picked" | "skipped" | "deferred".
#                             Commits with a decision do not appear in the issue.

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Close the open sync issue and open a fresh one."
        type: boolean
        default: false
  schedule:
    - cron: "0 7 * * 1" # Mondays 07:00 UTC

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  sync-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Add upstream remote and fetch
        run: |
          git remote add upstream https://github.com/serac-labs/serac.git || true
          git fetch upstream main --no-tags

      - name: Report unresolved commits to issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs")
            const { execSync } = require("child_process")
            const { owner, repo } = context.repo
            const force = context.payload.inputs?.force === "true"

            const STATE_PATH = ".github/upstream-sync-state.json"
            const state = JSON.parse(fs.readFileSync(STATE_PATH, "utf8"))
            const cursor = state.cursor
            const decisions = state.decisions || {}

            try {
              execSync(`git cat-file -e ${cursor}`, { stdio: "pipe" })
            } catch {
              core.setFailed(`cursor SHA ${cursor} not in history — aborting`)
              return
            }

            const upstreamHead = execSync("git rev-parse upstream/main").toString().trim()
            const log = execSync(
              `git log --no-merges --format=%H%x1f%s ${cursor}..upstream/main`,
            ).toString().trim()

            if (!log) {
              core.info("No new upstream commits since cursor.")
              state.last_synced_upstream = upstreamHead
              state.last_synced_at = new Date().toISOString().split("T")[0]
              fs.writeFileSync(STATE_PATH, JSON.stringify(state, null, 2) + "\n")
              return
            }

            const all = log.split("\n").map((line) => {
              const [sha, subject] = line.split("\x1f")
              return { sha, subject }
            })

            const unresolved = all.filter((c) => !decisions[c.sha])
            const decidedCount = all.length - unresolved.length

            const CORE = /^packages\/(opencode|plugin|sdk|ui|util)\//

            function classify(sha) {
              const files = execSync(`git show --name-only --pretty=format: ${sha}`)
                .toString().split("\n").filter(Boolean)
              const hasCore = files.some((f) => CORE.test(f))
              const hasSkip = files.some((f) => !CORE.test(f))
              return hasCore && hasSkip ? "mixed" : hasCore ? "core" : "skip-candidate"
            }

            for (const c of unresolved) {
              c.scope = classify(c.sha)
              const m = c.subject.match(/^(feat|fix|docs|chore|refactor|test|perf|ci|build|style)(\(.+?\))?!?:/)
              c.type = m ? m[1] : "other"
            }

            const byScope = {
              core: unresolved.filter((c) => c.scope === "core"),
              mixed: unresolved.filter((c) => c.scope === "mixed"),
              "skip-candidate": unresolved.filter((c) => c.scope === "skip-candidate"),
            }

            const existing = await github.rest.issues.listForRepo({
              owner, repo, state: "open", labels: "upstream-sync", per_page: 10,
            })

            if (force) {
              for (const issue of existing.data) {
                await github.rest.issues.update({
                  owner, repo, issue_number: issue.number, state: "closed",
                })
                core.info(`closed #${issue.number} (force=true)`)
              }
            }

            const openIssue = force ? null : existing.data[0]

            const short = (sha) => sha.slice(0, 9)
            const fmt = (c) => `${short(c.sha)} ${c.subject}`
            const listAll = (arr) => arr.map(fmt).join("\n")
            const listN = (arr, n) => {
              const shown = arr.slice(0, n).map(fmt).join("\n")
              return arr.length > n ? `${shown}\n… and ${arr.length - n} more` : shown
            }

            let body = `## Upstream Sync from serac-labs/serac\n\n`
            body += `**${unresolved.length} unresolved commit(s)** on upstream \`main\`.`
            if (decidedCount > 0) body += ` (${decidedCount} already decided in state file.)`
            body += `\n\n`
            body += `| Scope | Count | What |\n|---|---|---|\n`
            body += `| **core** | ${byScope.core.length} | touches \`packages/{opencode,plugin,sdk,ui,util}\` |\n`
            body += `| **mixed** | ${byScope.mixed.length} | core + non-core |\n`
            body += `| skip-candidate | ${byScope["skip-candidate"].length} | only app/desktop/docs/… or root config |\n\n`

            function appendGrouped(title, commits) {
              if (commits.length === 0) return
              body += `### ${title} (${commits.length})\n`
              const grouped = {}
              for (const c of commits) {
                if (!grouped[c.type]) grouped[c.type] = []
                grouped[c.type].push(c)
              }
              const order = ["feat", "fix", "refactor", "perf", "test", "chore", "ci", "build", "docs", "style", "other"]
              for (const t of order) {
                const list = grouped[t]
                if (!list) continue
                body += `\n**${t}** (${list.length})\n\`\`\`\n${listAll(list)}\n\`\`\`\n`
              }
              body += `\n`
            }

            appendGrouped("Core", byScope.core)
            appendGrouped("Mixed", byScope.mixed)

            if (byScope["skip-candidate"].length > 0) {
              body += `### Skip-candidate (${byScope["skip-candidate"].length})\n`
              body += `_First 30 shown._\n\`\`\`\n${listN(byScope["skip-candidate"], 30)}\n\`\`\`\n\n`
            }

            body += `_Claude Code will triage this automatically and open a PR. Review the PR to see what was picked, skipped, or deferred._\n`

            if (openIssue) {
              await github.rest.issues.createComment({
                owner, repo, issue_number: openIssue.number,
                body: `### Update (${new Date().toISOString().split("T")[0]})\n\n${body}`,
              })
              core.info(`commented on #${openIssue.number}`)
            } else {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: "upstream-sync" })
              } catch {
                await github.rest.issues.createLabel({
                  owner, repo, name: "upstream-sync", color: "0e8a16",
                  description: "Upstream sync from serac-labs/serac",
                })
              }
              const { data: created } = await github.rest.issues.create({
                owner, repo,
                title: `chore: upstream sync review ${new Date().toISOString().split("T")[0]}`,
                body,
                labels: ["upstream-sync"],
              })
              core.info(`created #${created.number}`)
            }

            state.last_synced_upstream = upstreamHead
            state.last_synced_at = new Date().toISOString().split("T")[0]
            fs.writeFileSync(STATE_PATH, JSON.stringify(state, null, 2) + "\n")

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Validate ANTHROPIC_API_KEY
        run: |
          if [ -z "${ANTHROPIC_API_KEY:-}" ]; then
            echo "::error::ANTHROPIC_API_KEY secret is not set. Add it to repository secrets."
            exit 1
          fi
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Triage and open PR
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HUSKY: "0"
        run: |
          claude -p "/sync-upstream" \
            --allowedTools "Bash(git*),Bash(bun*),Bash(gh*),Read,Write,Edit,Glob,Grep"
        timeout-minutes: 30
